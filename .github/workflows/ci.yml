name: CI
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  check:
    name: check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
    steps:
      - uses: actions/checkout@v7
      # rustup takes the channel and components from rust-toolchain.toml
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just check
  acceptance:
    name: acceptance / ${{ matrix.os }}
    runs-on: ubuntu-24
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - name: Install ledger
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install ledger
          else
            sudo apt-get update && sudo apt-get install -y ledger
          fi
      - run: just accept-ledger
  deny:
    name: deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      # cargo-deny shells out to cargo metadata, so it needs the pinned toolchain
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-deny
      - run: just deny
  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      # llvm-tools-preview for cargo-llvm-cov comes from rust-toolchain.toml
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Measure coverage
        run: cargo llvm-cov --branch --workspace --lcov --output-path coverage/lcov.info
      # Codecov stores the coverage % and shields.io renders it from there
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: true
