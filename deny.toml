# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny

# Fail on crates with a known RUSTSEC advisory
[advisories]
ignore = []

# Only these licenses are allowed
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
]
confidence-threshold = 0.8

# Reject duplicate crate versions and wildcard version requirements
[bans]
multiple-versions = "deny"
wildcards = "deny"
# The workspace crates depend on each other by path and do not have a version
allow-wildcard-paths = true
# syn 2 and syn 3 are both required due to clap_derive and serde_derive needing
# syn 2, and serde_repr uses syn 3
skip = [{ crate = "syn:2", reason = "proc-macro ecosystem is mid syn 2 to 3" }]

# Crates must come from crates.io, reject other registries and git sources
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
